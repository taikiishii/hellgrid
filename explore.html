<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HELLGRID — 「見たものだけ」で学習したAI (探索版デモ)</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0a0a0a;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: min(100vw, calc(100vh * 1.6));
    height: min(100vh, calc(100vw / 1.6));
    cursor: crosshair;
    outline: none;
  }
</style>
</head>
<body>
<canvas id="game" width="640" height="400"></canvas>
<!-- シミュレーション (DOM非依存・決定的。Node からも同じものを読み込む) -->
<script src="js/levels.js"></script>
<script src="js/sim/rng.js"></script>
<script src="js/sim/constants.js"></script>
<script src="js/sim/world.js"></script>
<!-- 探索版の観測・行動・迷路生成 (学習時とまったく同じもの) -->
<script src="env/mazegen.js"></script>
<script src="env/obs2.js"></script>
<script src="env/env2.js"></script>
<!-- 学習済みの方策 (tools/export-policy2.py が生成。手法の進化を段階別に) -->
<script src="js/policy2-explorer.js"></script>
<script src="js/policy2-navigator.js"></script>
<script src="js/policy2-champion.js"></script>
<script src="js/policy2-hunter.js"></script>
<!-- Policy クラス (js/ai.js) + 探索版ドライバ -->
<script src="js/ai.js"></script>
<script src="js/ai2.js"></script>
<!-- 見た目・音 (ブラウザ専用) -->
<script src="js/themes.js"></script>
<script src="js/sound.js"></script>
<script src="js/render.js"></script>
<script src="js/explore-main.js"></script>
</body>
</html>
