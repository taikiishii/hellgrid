<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HELLGRID — browser raycasting shooter</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0a0a0a;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: min(100vw, calc(100vh * 1.6));
    height: min(100vh, calc(100vw / 1.6));
    cursor: crosshair;
    outline: none;
  }
</style>
</head>
<body>
<canvas id="game" width="640" height="400"></canvas>
<!-- シミュレーション (DOM非依存・決定的。Node からも同じものを読み込む) -->
<script src="js/levels.js"></script>
<script src="js/sim/rng.js"></script>
<script src="js/sim/constants.js"></script>
<script src="js/sim/world.js"></script>
<!-- AI デモ: 観測と行動の定義は学習時とまったく同じものを使う。
     js/policy.js は学習済みの重み (tools/export-policy.py が生成)。
     無くてもゲームは普通に遊べる (AI デモが出ないだけ)。 -->
<script src="env/obs.js"></script>
<script src="env/env.js"></script>
<script src="js/policy.js"></script>
<script src="js/ai.js"></script>
<!-- 見た目・音・入力 (ブラウザ専用) -->
<script src="js/themes.js"></script>
<script src="js/sound.js"></script>
<script src="js/render.js"></script>
<script src="js/main.js"></script>
</body>
</html>
