<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HELLGRID — browser raycasting shooter</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0a0a0a;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: min(100vw, calc(100vh * 1.6));
    height: min(100vh, calc(100vw / 1.6));
    cursor: crosshair;
    outline: none;
  }
</style>
</head>
<body>
<canvas id="game" width="640" height="400"></canvas>
<script src="js/levels.js"></script>
<script src="js/game.js"></script>
</body>
</html>
